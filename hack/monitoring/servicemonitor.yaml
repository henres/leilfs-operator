# Scrape the saunafs-operator manager metrics endpoint exposed over
# plain HTTP on port 8080. We deliberately drop the kube-rbac-proxy
# sidecar to keep the dev/lab setup minimal — front it with a proper
# auth proxy in production.
#
# The `release: kube-prom-stack` label matches the default
# serviceMonitorSelector applied by the kube-prometheus-stack Helm
# chart, so Prometheus will discover and scrape this target out of
# the box.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: saunafs-operator-controller-manager
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: saunafs-operator
    release: kube-prom-stack
spec:
  namespaceSelector:
    matchNames:
      - saunafs-operator-system
  selector:
    matchLabels:
      control-plane: controller-manager
  endpoints:
    - port: metrics
      scheme: http
      path: /metrics
      interval: 30s
