---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-leilfs-leilfs-operator-io-v1alpha1-leilfscluster
  failurePolicy: Fail
  name: vleilfscluster.kb.io
  rules:
  - apiGroups:
    - leilfs.leilfs-operator.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - leilfsclusters
  sideEffects: None
