# permissions for end users to edit saunafsclusters.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: saunafscluster-editor-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: saunafs-operator
    app.kubernetes.io/part-of: saunafs-operator
    app.kubernetes.io/managed-by: kustomize
  name: saunafscluster-editor-role
rules:
