    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          LocalDisk represents a physical or virtual block device discovered on a
          Kubernetes node. The disk-agent DaemonSet creates and updates these
          resources automatically. An operator sets spec.format=true to trigger
          formatting, after which the controller creates a PersistentVolume for
          the disk.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LocalDiskSpec defines the desired state of LocalDisk.
            properties:
              format:
                description: |-
                  Format triggers formatting of the disk when set to true.
                  Once set to true this field is effectively immutable: resetting it to
                  false after formatting has started will have no effect.
                type: boolean
              fsType:
                default: xfs
                description: |-
                  FSType is the filesystem type to use when formatting the disk.
                  Supported values: xfs, ext4.
                  Defaults to xfs if not specified.
                enum:
                - xfs
                - ext4
                type: string
            type: object
          status:
            description: LocalDiskStatus defines the observed state of LocalDisk.
            properties:
              conditions:
                description: Conditions holds standard Kubernetes conditions for this
                  disk.
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              device:
                description: |-
                  Device is the current block device path (e.g. /dev/sdb).
                  This may change across reboots; use UUID to track the disk reliably.
                type: string
              fsType:
                description: FSType is the filesystem type detected on the disk (empty
                  if unformatted).
                type: string
              lastUpdated:
                description: LastUpdated is the timestamp of the last status update
                  by the agent.
                format: date-time
                type: string
              message:
                description: |-
                  Message contains human-readable details about the current state,
                  especially useful when State is FormatFailed.
                type: string
              mountPath:
                description: |-
                  MountPath is the directory where the disk is bind-mounted for
                  local-static-provisioner to discover.
                type: string
              node:
                description: Node is the Kubernetes node name where the disk resides.
                type: string
              serial:
                description: Serial is the disk serial number as reported by the kernel,
                  if available.
                type: string
              sizeBytes:
                description: SizeBytes is the total capacity of the disk in bytes.
                format: int64
                type: integer
              sizeHumanReadable:
                description: SizeHumanReadable is the human-readable representation
                  of SizeBytes.
                type: string
              state:
                default: Empty
                description: State is the current lifecycle state of the disk.
                enum:
                - Empty
                - PendingFormat
                - Formatting
                - Ready
                - Missing
                - Unmanaged
                - FormatFailed
                type: string
              uuid:
                description: |-
                  UUID is the filesystem UUID assigned after formatting.
                  This is the stable identifier used as the PersistentVolume name.
                type: string
