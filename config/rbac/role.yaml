---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - saunafs.saunafs-operator.io
  resources:
  - saunafsclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - saunafs.saunafs-operator.io
  resources:
  - saunafsclusters/finalizers
  verbs:
  - update
- apiGroups:
  - saunafs.saunafs-operator.io
  resources:
  - saunafsclusters/status
  verbs:
  - get
  - patch
  - update
