# git-cliff configuration.
#
# Generates CHANGELOG.md (and, for a single tag, GitHub Release notes) from
# this repo's Conventional Commit history. Grouping mirrors the commit
# types documented in AGENTS.md ("Commit conventions"): feat, fix, refactor,
# test, chore, docs, perf, plus ci (used by this repo's own workflow
# commits). Consumed by `.github/workflows/release.yml` via
# `orhun/git-cliff-action`; see "Cutting a release" in AGENTS.md.

[changelog]
header = """
# Changelog
All notable changes to this project are documented in this file.
The format is loosely based on Conventional Commits groupings.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
    - {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^test", group = "Testing" },
  { message = "^docs", group = "Documentation" },
  { message = "^ci", group = "CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Chore" },
  { message = "^revert", group = "Reverted" },
  { message = ".*", group = "Other" },
]
