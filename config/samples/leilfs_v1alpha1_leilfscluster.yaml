apiVersion: saunafs.saunafs-operator.io/v1alpha1
kind: LeilFSCluster
metadata:
  labels:
    app.kubernetes.io/name: saunafscluster
    app.kubernetes.io/instance: saunafscluster-sample
    app.kubernetes.io/part-of: saunafs-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: saunafs-operator
  name: saunafscluster-sample
spec:
  master:
    image: ghcr.io/henres/saunafs-container/saunafs-master:5.9.0
    # nodeSelector:
    #   saunafs-role: master
    ports:
      - name: client
        containerPort: 9421
      - name: cs
        containerPort: 9420
      - name: admin
        containerPort: 9419
    # metadataStorage configures the PVC used to persist /var/lib/saunafs
    # across pod restarts, undeploy/deploy cycles and node reboots.
    # StorageClass defaults to the cluster default (local-path in Kind).
    metadataStorage:
      size: 1Gi
    # startupGracePeriod is how long the ha-sidecar waits after pod start
    # before health-checking sfsmaster via pgrep. Increase for large
    # filesystems where metadata loading takes longer (default: 30s).
    # startupGracePeriod: 30s
  # Shadow master — hot standby that receives the changelog stream from the
  # active master. If the active master disappears the operator promotes the
  # shadow automatically (no sfsmetarestore needed). Requires at least 1 replica.
  shadow:
    replicas: 1
    image: ghcr.io/henres/saunafs-container/saunafs-master:5.9.0
    metadataStorage:
      storageClassName: standard
      size: 1Gi
  # Metaloggers — warm standby replicas that shadow master metadata.
  # Each replica gets its own PVC (local-path StorageClass in Kind).
  metalogger:
    replicas: 2
    image: ghcr.io/henres/saunafs-container/saunafs-metalogger:5.9.0
    metadataStorage:
      storageClassName: standard
      size: 1Gi
  # Chunk servers — 1 chunkserver per disk, 2 disks per node, 3 nodes = 6 chunkservers.
  # label matches the node name so goals can pin chunks to specific nodes.
  chunk:
    image: ghcr.io/henres/saunafs-container/saunafs-chunkserver:5.9.0
    ports:
      - name: data
        containerPort: 9422
    servers:
      - name: worker1-hdd001
        nodeName: saunafs-operator-worker
        label: worker1
        mountPaths:
          - path: /mnt/hdd001
            hostPath: /mnt/hdd001
      - name: worker1-hdd002
        nodeName: saunafs-operator-worker
        label: worker1
        mountPaths:
          - path: /mnt/hdd002
            hostPath: /mnt/hdd002
      - name: worker2-hdd001
        nodeName: saunafs-operator-worker2
        label: worker2
        mountPaths:
          - path: /mnt/hdd001
            hostPath: /mnt/hdd001
      - name: worker2-hdd002
        nodeName: saunafs-operator-worker2
        label: worker2
        mountPaths:
          - path: /mnt/hdd002
            hostPath: /mnt/hdd002
      - name: worker3-hdd001
        nodeName: saunafs-operator-worker3
        label: worker3
        mountPaths:
          - path: /mnt/hdd001
            hostPath: /mnt/hdd001
      - name: worker3-hdd002
        nodeName: saunafs-operator-worker3
        label: worker3
        mountPaths:
          - path: /mnt/hdd002
            hostPath: /mnt/hdd002
  csi:
    enabled: false
    driverName: saunafs.csi.saunafs-operator.io
    image: ghcr.io/henres/saunafs-container/saunafs-client:5.9.0
  goals:
    # EC goal for maximum efficiency (6 CS required).
    - id: 10
      name: ec_4_2
      ec:
        dataParts: 4
        parityParts: 2
      default: true
    # Node-spread goal: 3 copies, one per physical node (pin by label).
    - id: 11
      name: node_spread
      replication: 3
      nodeLabels:
        - worker1
        - worker2
        - worker3
  interface:
    enabled: true
    image: ghcr.io/henres/saunafs-container/saunafs-cgiserver:5.9.0
    serviceType: NodePort
  nfs:
    enabled: true
    image: ghcr.io/henres/saunafs-operator/nfs-ganesha:latest
    exportPath: /
    squash: No_Root_Squash
    serviceType: NodePort
    nodePort: 32049
