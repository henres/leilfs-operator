apiVersion: saunafs.saunafs-operator.io/v1alpha1
kind: SaunaFSCluster
metadata:
  labels:
    app.kubernetes.io/name: saunafscluster
    app.kubernetes.io/instance: saunafscluster-sample
    app.kubernetes.io/part-of: saunafs-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: saunafs-operator
  name: saunafscluster-sample
spec:
  master:
    image: saunafs-master:latest
    # nodeSelector:
    #   saunafs-role: master
    ports:
      - name: client
        containerPort: 9421
      - name: cs
        containerPort: 9420
      - name: admin
        containerPort: 9419
    # metadataStorage configures the PVC used to persist /var/lib/saunafs
    # across pod restarts, undeploy/deploy cycles and node reboots.
    # StorageClass defaults to the cluster default (local-path in Kind).
    metadataStorage:
      size: 1Gi
  # Chunk servers — 1 chunkserver per disk, 2 disks per node, 3 nodes = 6 chunkservers.
  # This layout enables ec(4,2) erasure coding (50% overhead, tolerates 2 simultaneous failures).
  # Node names follow the kind convention for cluster name "saunafs-operator".
  chunk:
    image: saunafs-chunkserver:latest
    ports:
      - name: data
        containerPort: 9422
    servers:
      - name: worker1-hdd001
        nodeName: saunafs-operator-worker
        mountPaths:
          - path: /mnt/hdd001
            hostPath: /mnt/hdd001
      - name: worker1-hdd002
        nodeName: saunafs-operator-worker
        mountPaths:
          - path: /mnt/hdd002
            hostPath: /mnt/hdd002
      - name: worker2-hdd001
        nodeName: saunafs-operator-worker2
        mountPaths:
          - path: /mnt/hdd001
            hostPath: /mnt/hdd001
      - name: worker2-hdd002
        nodeName: saunafs-operator-worker2
        mountPaths:
          - path: /mnt/hdd002
            hostPath: /mnt/hdd002
      - name: worker3-hdd001
        nodeName: saunafs-operator-worker3
        mountPaths:
          - path: /mnt/hdd001
            hostPath: /mnt/hdd001
      - name: worker3-hdd002
        nodeName: saunafs-operator-worker3
        mountPaths:
          - path: /mnt/hdd002
            hostPath: /mnt/hdd002
  csi:
    enabled: false
    driverName: saunafs.csi.saunafs-operator.io
    image: saunafs-client:latest
  goals:
    - id: 10
      name: ec_4_2
      ec:
        dataParts: 4
        parityParts: 2
      default: true
  interface:
    enabled: true
    image: saunafs-cgiserver:latest
    serviceType: NodePort
  nfs:
    enabled: true
    image: nfs-ganesha:latest
    exportPath: /
    squash: No_Root_Squash
    serviceType: NodePort
    nodePort: 32049
